<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/katalog-mobil.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
    <title>Katalog Mobil</title>
</head>

<body>
    <main>
        <div class="main-container">
            <div class="sidebar">
                <h2>DW Rental Car</h2>

                <div class="menu">

                    <button>
                        <img src="/image/dashboard.png" alt="">
                        <span>Dashboard</span>
                    </button>

                    <button class="active">
                        <img src="/image/katalog.png" alt="">
                        <span>Katalog Mobil</span>
                    </button>

                </div>

                <div class="exit">
                    <button>
                        <img src="/image/exit.png" alt="">
                        <span>Keluar</span>
                    </button>
                </div>
            </div>

            <div class="header">
                <h1 class="title">Katalog Mobil</h1>
            </div>

            <div class="main">

                <div class="tool-box">

                    <div class="util-container">
                        <button class="active">
                            Semua
                        </button>
                        <button>
                            Toyota
                        </button>
                        <button>
                            Tesla
                        </button>
                        <button>
                            Honda
                        </button>
                    </div>

                    <div class="sort">
                        <div class="img-container">
                            <img src="/image/sort.png" alt="">
                        </div>
                        <label for="sort-car">Urutkan</label>
                        <select name="sort-car" id="sort-car">
                            <option value="newest">Terbaru</option>
                            <option value="oldest">Terlama</option>
                            <option value="most expensive">Paling mahal</option>
                            <option value="cheapest">Paling murah</option>
                        </select>
                    </div>

                </div>

                <div class="product-container">

                    <div class="item-card">

                        <div class="status-product-active">
                            Tersedia
                        </div>

                        <div class="img-item-container">
                            <img src="/image/avanza.png" alt="">
                        </div>

                        <div class="info">
                            <h5>Toyota Avanza</h5>
                            <div class="location">
                                <div>
                                    <img src="/image/location.png" alt="">
                                </div>
                                <p>Jl.Diporegoro No.22, Citarum</p>
                            </div>
                            <p>Rp 750.000</p>
                            <div class="car-info">
                                <div class="capacity">
                                    <img src="/image/person.png" alt="">
                                    <p>7 Kursi</p>
                                </div>
                                <div class="year-production">
                                    <img src="/image/calender.png" alt="">
                                    <p>2022</p>
                                </div>
                            </div>
                        </div>

                        <div class="rent-button" id="rent-button">
                            <button>Pinjam</button>
                        </div>

                    </div>

                </div>

            </div>

            <!-- Pop up pinjam-->

            <div class="popup-overlay" id="popupOverlay">

                <div class="popup-container">

                    <div class="popup-header">
                        <h2>Detail Peminjaman</h2>
                        <button id="closePopup">&times;</button>
                    </div>

                    <div class="summary-container">
                        <div class="img-car-summary">
                            <img src="/image/avanza.png" alt="">
                        </div>

                        <h2>Toyota Avanza</h2>

                        <div class="summary-location">
                            <img src="/image/location.png" alt="">
                            <p>Cabang: Jl Diponegoro No 22, Citarum</p>
                        </div>

                        <p>Harga sewa per hari: Rp750.000</p>

                        <div class="summary-car-detail">
                            <div class="summary-car-spec">
                                <img src="/image/person.png" alt="">
                                <p>7 Kursi</p>
                            </div>

                            <div class="summary-car-spec">
                                <img src="/image/calender.png" alt="">
                                <p>2022</p>
                            </div>
                        </div>

                    </div>

                    <form class="popup-form" method="post">

                        <div class="input-group">
                            <label>Pilih Tanggal Mulai</label>
                            <input type="date" id="tanggal-mulai" required
                                onclick="document.getElementById('tanggal-mulai').showPicker()">
                        </div>

                        <div class="input-group">
                            <label>Pilih Tanggal Kembali</label>
                            <input type="date" id="tanggal-kembali" required
                                onclick="document.getElementById('tanggal-kembali').showPicker()">
                        </div>

                        <div class="input-group">
                            <label>Total Harga</label>
                            <input type="text" id="total-harga" readonly>
                        </div>

                        <div class="button-group">
                            <button type="button" class="btn-cancel" id="cancelPopup">
                                Batal
                            </button>

                            <button type="submit" class="btn-submit" id="button-submit">
                                Booking
                            </button>
                        </div>

                    </form>

                </div>

            </div>

    </main>
    <script src="/Scripts/katalogMobil.js"></script>
</body>

</html>
