<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Rental</title>
    <link rel="stylesheet" href="/CSS/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Roboto:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <main>

        <div class="container">
            <div class="left">
                <div class="title-container">

                    <h2 id="brand-title">
                        DW Car Rental
                    </h2>

                    <h1 id="slogan">
                        Rental Mobil di AnimalLand
                    </h1>

                    <p id="desc">
                        Selamat datang kembali di DW Car Rental,
                        mohon login terlebih dahulu
                    </p>

                </div>
                <div class="form-container">

                    <form action="" id="form-field">

                        <input type="email" class="input-field" placeholder="Email Address" required>

                        <input type="password" class="input-field" placeholder="Password" required>

                        <div class="button-group">

                            <button type="submit" id="login-button">
                                Login
                            </button>

                            <a href="sign-in">
                                <button type="button" id="signin-button">
                                    Sign Up
                                </button>
                            </a>

                        </div>
                    </form>

                </div>
            </div>

            <div class="right">

            </div>

        </div>

    </main>
    <script src="/Scripts/log-in.js"></script>
</body>

</html>
