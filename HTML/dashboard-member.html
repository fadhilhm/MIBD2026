<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/dashboard-member.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>Dasboard</title>
</head>
<body>
    <main>
        <div class="main-container">
            <div class="sidebar">

            <h2>DW Rental Car</h2>

            <div class="menu">

                <button class="active">

                    <img src="/image/dashboard.png" alt="">
                    <span>Dashboard</span>

                </button>

                <button id="button-katalog">

                    <img src="/image/katalog.png" alt="">
                    <span>Katalog Mobil</span>

                </button>

            </div>

            <div class="exit">

                <button id="button-keluar">

                    <img src="/image/exit.png" alt="">
                    <span>Keluar</span>

                </button>

            </div>

        </div>
            <div class="header">
                <h1 class="title">Dashboard</h1>
            </div>
            <div class="main">

                <div class="card">

                    <div class="card-title">
                        <h3>Rental Aktif</h3>
                        <a href="#">Rental Lainnya</a>
                    </div>

                    <div class="car-content">

                        <div class="car-image">
                            <img src="/image/avanza.png" alt="">
                        </div>

                        <div class="car-info">
                            <h2>Toyota Avanza - Merah</h2>
                            <p>Bandung</p>
                            <p>Dikembalikan pada 25 Oktober 2026</p>

                            <div class="car-detail">
                                <div class="detail-item">
                                    <div class="car-detail-img">
                                        <img src="/image/person.png" alt="">
                                    </div>
                                    7 kursi
                                </div>
                                <div class="detail-item">
                                    <div class="car-detail-img">
                                        <img src="/image/calender.png" alt="">
                                    </div>
                                    2022
                                </div>
                            </div>

                        </div>

                    </div>

                </div>

                <div class="riwayat-transaksi">

                    <h2>Riwayat Rental Terakhir</h2>

                    <table>

                        <tr>
                            <th>Kendaraan</th>
                            <th>Tanggal Peminjaman</th>
                            <th>Total</th>
                        </tr>

                        <tr>
                            <td>Toyota Avanza</td>
                            <td>14 Januari 2026 - 27 Februari 2026</td>
                            <td>Rp. 10.000.000</td>
                        </tr>

                    </table>

                </div>

            </div>
        </div>
    </main>
    <script>
        document.getElementById('button-katalog').addEventListener('click', () => {
            window.location.href = 'katalog-mobil';
        });

        document.getElementById('button-keluar').addEventListener('click', () => {
            window.location.href = 'login';
        });
    </script>
</body>
</html>
