<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/dashboard-pegawai.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>Dashboard</title>
</head>
<body>
    <main>
        <div class="main-container">
            <h2>DW Car Rental</h2>

            <div class="header">
                <div class="card-header">
                    <h3>Rental Aktif</h3>
                    <h4>0</h4>
                </div>
                <div class="card-header">
                    <h3>Mobil Kembali Hari Ini</h3>
                    <h4>0</h4>
                </div>
                <div class="card-header">
                    <h3>Menuggu Verifikasi</h3>
                    <h4>0</h4>
                </div>
            </div>

            <div class="table-container">
                <h3>Data Penyewaan</h3>
                <table class="table-penyewaan">
                    <thead>
                        <tr>
                            <th scope="col">Pelanggan</th>
                            <th scope="col">Mobil</th>
                            <th scope="col">Nopol</th>
                            <th scope="col">Tanggal</th>
                            <th scope="col">Deadline</th>
                            <th scope="col">Status</th>
                            <th scope="col">Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Anton</td>
                            <td>Toyota Avanza</td>
                            <td>D 1234 AB</td>
                            <td>20 Januari 2026</td>
                            <td>25 Januari 2026</td>
                            <td>
                                <p id="running-status">Berjalan</p>
                                <p id="done-status">Dikembalikan</p>
                            </td>
                            <td><button id="done-button">Selesaikan</button></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="exit-button-container">
                <a href="http://">
                    <img src="/image/exit.png" alt="">
                    <p>Keluar</p>
                </a>
            </div>

            
        </div>
        
        <!-- POP UP Selesaikan -->
        <!-- Enable dengan JS -->
        <!-- Caranya timpa class css -->
        <div class="popup-overlay" id="popupOverlay">

            <div class="popup-container">

                <div class="popup-header">
                    <h2>Form Pengembalian</h2>
                    <button id="closePopup">&times;</button>
                </div>

                <form class="popup-form">

                    <div class="input-group">
                        <label>Tanggal Sewa</label>
                        <input type="date" id="tanggal-sewa" readonly>
                    </div>

                    <div class="input-group">
                        <label>Tanggal Kembali</label>
                        <input type="date" id="tanggal-kemabli" readonly>
                    </div>

                    <div class="input-group">
                        <label>Jumlah Hari Terlambat</label>
                        <input type="text" id="jumlah-terlambat" readonly>
                    </div>

                    <div class="input-group">
                        <label>Total Denda</label>
                        <input type="text" id="total-denda" readonly>
                    </div>

                    <div class="input-group">
                        <label>Link Foto Setelah Pemakaian</label>
                        <input type="text" required>
                    </div>

                    <div class="button-group">
                        <button type="button" class="btn-cancel" id="cancelPopup">
                            Batal
                        </button>

                        <button type="submit" class="btn-submit">
                            Kembalikan
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </main>
    <script src="/Scripts/dashboardPegawai.js">
    </script>
</body>
</html>
