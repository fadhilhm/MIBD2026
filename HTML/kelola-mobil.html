<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/CSS/kelola-mobil.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <title>Dasboard</title>
</head>
<body>
    <main>
        <div class="main-container">
            <div class="sidebar">

            <h2>DW Rental Car</h2>

            <div class="menu">

                <button class="active">
                    <img src="/image/katalog.png" alt="">
                    <span>Kelola Mobil</span>
                </button>

            </div>

            <div class="exit">
                <button>
                    <img src="/image/exit.png" alt="">
                    <span>Keluar</span>
                </button>
            </div>

        </div>
            <div class="header">
                <h1 class="title">Kelola Mobil</h1>
            </div>
            <div class="main">

                <div class="product-container">

                    <div class="item-card">

                        <div class="status-product-active">
                            Tersedia
                        </div>

                        <div class="img-item-container">
                            <img src="/image/avanza.png" alt="">
                        </div>

                        <div class="info">
                            <h5>Toyota Avanza</h5>
                            <div class="location">
                                <div>
                                    <img src="/image/location.png" alt="">
                                </div>
                                <p>Jl.Diporegoro No.22, Citarum</p>
                            </div>
                            <p>Rp 750.000</p>
                            <div class="car-info">
                                <div class="capacity">
                                    <img src="/image/person.png" alt="">
                                    <p>7 Kursi</p>
                                </div>
                                <div class="year-production">
                                    <img src="/image/calender.png" alt="">
                                    <p>2022</p>
                                </div>
                            </div>
                        </div>

                        <div class="group-button">
                            <button class="change-button">Ubah</button>
                            <button class="delete-button">Hapus</button>
                        </div>

                    </div>

                </div>


                <buttonc id="add-car">Tambah</button>

            </div>
        </div>
    </main>
    <script></script>
</body>
</html>
